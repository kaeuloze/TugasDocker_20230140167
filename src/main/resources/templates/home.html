<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        table tbody tr:hover {
            background-color: #f1f1f1;
            transition: 0.2s;
        }
    </style>
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Dashboard</span>
        <a href="/" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Daftar Mahasiswa</h3>
        <a href="/form" class="btn btn-success">+ Tambah Data</a>
    </div>

    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table table-bordered table-hover text-center align-middle shadow-sm">

            <thead class="table-primary">
            <tr>
                <th>No</th>
                <th>Inisial</th>
                <th>Nama</th>
                <th>NIM</th>
            </tr>
            </thead>

            <tbody>

            <!-- LOOP DATA -->
            <tr th:each="item, iterStat : ${dataList}">
                <td th:text="${iterStat.index + 1}"></td>

                <!-- Avatar jadi inisial -->
                <td>
                        <span class="badge bg-primary rounded-circle p-3"
                              th:text="${#strings.substring(item.nama,0,1)}"></span>
                </td>

                <td th:text="${item.nama}"></td>
                <td th:text="${item.nim}"></td>
            </tr>

            <!-- KALAU KOSONG -->
            <tr th:if="${#lists.isEmpty(dataList)}">
                <td colspan="4" class="text-muted">Belum ada data 😢</td>
            </tr>

            </tbody>

        </table>
    </div>

</div>

</body>
</html>
